<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- EDIT: page title shown in the browser tab -->
  <title>Enrico Marcato</title>
  <meta name="description" content="" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:     #F8F7F3;   /* warm paper */
      --ink:    #17181A;   /* near-black text */
      --muted:  #6E6B63;   /* secondary text */
      --line:   #E4E0D7;   /* hairlines */
      --accent: #BC4B2F;   /* Dutch bike-lane brick red, used sparingly */
      --max:    640px;
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      font-size: 19px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 14vh 24px 12vh;
    }

    /* mono eyebrows / labels — a small nod to the engineering side */
    .eyebrow {
      font-family: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .eyebrow::before {
      content: "";
      width: 18px;
      height: 2px;
      background: var(--accent);
      display: inline-block;
    }

    h1 {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 600;
      font-size: clamp(40px, 9vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.02em;
      margin: 0 0 22px;
    }

    /* the name doubles as the home link — keep it looking like the heading */
    h1 a.home {
      color: inherit;
      background: none;
      padding: 0;
      transition: color 0.25s ease;
    }
    h1 a.home:hover, h1 a.home:focus-visible { color: var(--accent); }

    .lede {
      font-size: clamp(21px, 3.4vw, 25px);
      line-height: 1.5;
      margin: 0 0 8px;
    }
    .lede em { font-style: italic; }

    section { margin-top: 64px; }

    h2 {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 18px;
    }

    p { margin: 0 0 18px; }

    a {
      color: var(--ink);
      text-decoration: none;
      background-image: linear-gradient(var(--accent), var(--accent));
      background-size: 100% 1.5px;
      background-repeat: no-repeat;
      background-position: 0 100%;
      padding-bottom: 1px;
      transition: background-size 0.25s ease;
    }
    a:hover, a:focus-visible { background-size: 0% 1.5px; color: var(--accent); }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

    /* projects */
    .project {
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }
    .project:last-child { border-bottom: 1px solid var(--line); }
    .project h3 {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 600;
      font-size: 21px;
      margin: 0 0 4px;
    }
    .project p { color: var(--muted); font-size: 17px; margin: 0; }

    /* contact line — terminal-ish, ties to the engineering identity */
    .links {
      font-family: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 15px;
      line-height: 2.1;
    }
    .links span { color: var(--muted); }

    footer {
      margin-top: 72px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* gentle entrance, disabled for anyone who prefers no motion */
    @media (prefers-reduced-motion: no-preference) {
      .reveal { opacity: 0; transform: translateY(14px); animation: rise 0.7s cubic-bezier(.2,.7,.3,1) forwards; }
      .reveal:nth-child(2) { animation-delay: 0.08s; }
      .reveal:nth-child(3) { animation-delay: 0.16s; }
      @keyframes rise { to { opacity: 1; transform: none; } }
    }

    /* globe card */
    .globe-card {
      width: 100%;
      background: #11151C;
      border-radius: 18px;
      padding: 14px 14px 26px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.18);
      color: #E6E9ED;
      margin-bottom: 24px;
    }
    .globe-card svg { display: block; width: 100%; height: auto; border-radius: 12px; }
    .globe-card .caption {
      text-align: center; font-size: 19px; line-height: 1.55;
      margin: 18px 12px 0;
    }
    .globe-card .dist { color: #FF3B6B; font-style: italic; font-weight: 500; }
    .globe-card .sub { display: block; margin-top: 8px; font-size: 13px; color: #8A93A0; }

    .globe-arc { fill: none; stroke: #FF3B6B; stroke-width: 2.4;
                 stroke-linecap: round; stroke-dasharray: 0.1 11; opacity: 0; }
    .globe-arc.show { opacity: 1; transition: opacity .5s ease; }
    @media (prefers-reduced-motion: no-preference) {
      .globe-arc.show { animation: globe-flow 1.4s linear infinite, globe-fadein .5s ease; }
      @keyframes globe-flow { to { stroke-dashoffset: -22; } }
      @keyframes globe-fadein { from { opacity: 0; } to { opacity: 1; } }
    }
  </style>
</head>
<body>
  <main class="wrap">

    <!-- ===== HERO ===== -->
    <p class="eyebrow reveal"></p>
    <h1 class="reveal"><a class="home" href="/" aria-label="Home">Enrico Marcato</a></h1>
    <p class="lede reveal">
      Hi there, I'm Enrico. 
    </p>

    <!-- ===== ABOUT ===== -->
    <section>
      <h2>About me</h2>
      <div class="globe-card">
        <svg id="globe" viewBox="0 0 560 420" role="img" aria-label="A globe showing the distance from The Hague to your location"></svg>
        <p class="caption">
          I'm from The Hague, Netherlands<span id="distWrap"></span>.
          <span class="sub">based on your IP address</span>
        </p>
      </div>
    </section>

    <!-- ===== PROJECTS =====
         To add a project: copy one .project block, change the text, point the link
         at your repo or a live page. Delete the placeholder once you ship the first one. -->
    <section>
      <h2></h2>

      <div class="project">

      </div>

      <!-- Example of a real one (uncomment + edit when ready):
      <div class="project">
        <h3><a href="https://github.com/yourusername/your-repo">EDI flow monitor</a></h3>
        <p>A small dashboard that flags failed transmissions before anyone notices.</p>
      </div>
      -->
    </section>

    <!-- ===== REACH OUT ===== -->
    <section>
      <h2>Say hello</h2>
      <p class="links">
        <span>email&nbsp;&nbsp;→</span> <a href="mailto:enricmarcato@gmail.com">enricmarcato@gmail.com</a><br />
        <span>linkedin →</span> <a href="https://www.linkedin.com/in/enrimarcato">/in/enrimarcato</a><br />
        <!-- EDIT: replace with your GitHub username -->
        <span>github&nbsp;&nbsp;→</span> <a href="https://github.com/enricomarcato">/enricomarcato</a>
      </p>
    </section>

    <footer>
      © <span id="y"></span> Enrico Marcato · hosted on GitHub Pages
    </footer>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script>
    const HOME = [4.4777, 51.9244]; // [lon, lat] — The Hague

    const C = {
      accent: '#FF3B6B',
      ocean:  '#1B2330',
      land:   '#2C3645',
      grid:   'rgba(255,255,255,0.06)',
      pin:    '#C3CAD4',
    };

    const W = 560, H = 420;
    const projection = d3.geoOrthographic().scale(195).translate([W/2, H/2]).clipAngle(90);
    const path = d3.geoPath(projection);
    const svg = d3.select("#globe");

    function draw(visitor, land) {
      const target = visitor || HOME;

      // zoom in for nearby visitors, full globe for distant ones
      // each point sits scale*sin(ang/2) px from the midpoint in orthographic projection,
      // so fitting them in ~70% of the viewport width gives: scale = 100/sin(ang/2)
      const ang = d3.geoDistance(HOME, target);
      const scale = visitor ? Math.max(195, Math.min(1400, 100 / Math.sin(ang / 2))) : 195;
      projection.scale(scale);

      const mid = d3.geoInterpolate(HOME, target)(0.5);
      projection.rotate([-mid[0], -mid[1] * 0.7]);

      svg.append("path").attr("d", path({type: "Sphere"})).attr("fill", C.ocean);
      svg.append("path").attr("d", path(d3.geoGraticule10()))
         .attr("fill", "none").attr("stroke", C.grid).attr("stroke-width", 0.6);
      if (land) {
        svg.append("path").attr("d", path(land))
           .attr("fill", C.land).attr("stroke", "rgba(0,0,0,.25)").attr("stroke-width", .4);
      }

      if (visitor) {
        svg.append("path")
           .attr("class", "globe-arc show")
           .attr("d", path({type: "LineString", coordinates: [HOME, visitor]}));
      }

      marker(HOME, C.accent, true);
      if (visitor) marker(visitor, C.pin, false);
    }

    function marker(coord, color, isHome) {
      const p = projection(coord);
      if (!p) return;
      const g = svg.append("g").attr("transform", `translate(${p[0]},${p[1]})`);
      if (isHome) {
        g.append("circle").attr("r", 9).attr("fill", color).attr("opacity", .25);
        g.append("circle").attr("r", 4).attr("fill", color);
      } else {
        g.append("circle").attr("r", 5).attr("fill", color);
        g.append("circle").attr("r", 5).attr("fill", "none")
         .attr("stroke", color).attr("stroke-width", 2).attr("opacity", .4)
         .append("animate").attr("attributeName", "r").attr("values", "5;11;5")
         .attr("dur", "2.2s").attr("repeatCount", "indefinite");
      }
    }

    function distanceKm(a, b) {
      const R = 6371, toRad = d => d * Math.PI / 180;
      const dLat = toRad(b[1] - a[1]), dLon = toRad(b[0] - a[0]);
      const x = Math.sin(dLat/2)**2 + Math.cos(toRad(a[1])) * Math.cos(toRad(b[1])) * Math.sin(dLon/2)**2;
      return Math.round(2 * R * Math.asin(Math.sqrt(x)));
    }

    async function init() {
      let land = null, visitor = null;
      try {
        const world = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json").then(r => r.json());
        land = topojson.feature(world, world.objects.land);
      } catch(e) { console.warn("map unavailable", e); }
      try {
        const d = await fetch("https://ipapi.co/json/").then(r => r.json());
        if (typeof d.latitude === "number" && typeof d.longitude === "number") {
          visitor = [d.longitude, d.latitude];
          const kmNum = distanceKm(HOME, visitor);
          document.getElementById("distWrap").innerHTML =
            ', roughly <span class="dist">' + kmNum.toLocaleString("en-US") + ' km</span> away from your current location';
        }
      } catch(e) { console.warn("location unavailable", e); }
      draw(visitor, land);
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- EDIT: page title shown in the browser tab -->
  <title>Enrico Marcato</title>
  <meta name="description" content="" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:     #F8F7F3;   /* warm paper */
      --ink:    #17181A;   /* near-black text */
      --muted:  #6E6B63;   /* secondary text */
      --line:   #E4E0D7;   /* hairlines */
      --accent: #BC4B2F;   /* Dutch bike-lane brick red, used sparingly */
      --max:    640px;
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      font-size: 19px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 14vh 24px 12vh;
    }

    /* mono eyebrows / labels — a small nod to the engineering side */
    .eyebrow {
      font-family: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .eyebrow::before {
      content: "";
      width: 18px;
      height: 2px;
      background: var(--accent);
      display: inline-block;
    }

    h1 {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 600;
      font-size: clamp(40px, 9vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.02em;
      margin: 0 0 22px;
    }

    /* the name doubles as the home link — keep it looking like the heading */
    h1 a.home {
      color: inherit;
      background: none;
      padding: 0;
      transition: color 0.25s ease;
    }
    h1 a.home:hover, h1 a.home:focus-visible { color: var(--accent); }

    .lede {
      font-size: clamp(21px, 3.4vw, 25px);
      line-height: 1.5;
      margin: 0 0 8px;
    }
    .lede em { font-style: italic; }

    section { margin-top: 64px; }

    h2 {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 18px;
    }

    p { margin: 0 0 18px; }

    a {
      color: var(--ink);
      text-decoration: none;
      background-image: linear-gradient(var(--accent), var(--accent));
      background-size: 100% 1.5px;
      background-repeat: no-repeat;
      background-position: 0 100%;
      padding-bottom: 1px;
      transition: background-size 0.25s ease;
    }
    a:hover, a:focus-visible { background-size: 0% 1.5px; color: var(--accent); }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 2px; }

    /* projects */
    .project {
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }
    .project:last-child { border-bottom: 1px solid var(--line); }
    .project h3 {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 600;
      font-size: 21px;
      margin: 0 0 4px;
    }
    .project p { color: var(--muted); font-size: 17px; margin: 0; }

    /* contact line — terminal-ish, ties to the engineering identity */
    .links {
      font-family: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 15px;
      line-height: 2.1;
    }
    .links span { color: var(--muted); }

    footer {
      margin-top: 72px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* gentle entrance, disabled for anyone who prefers no motion */
    @media (prefers-reduced-motion: no-preference) {
      .reveal { opacity: 0; transform: translateY(14px); animation: rise 0.7s cubic-bezier(.2,.7,.3,1) forwards; }
      .reveal:nth-child(2) { animation-delay: 0.08s; }
      .reveal:nth-child(3) { animation-delay: 0.16s; }
      @keyframes rise { to { opacity: 1; transform: none; } }
    }

    /* globe card */
    .globe-card {
      position: relative;
      width: 100%;
      background:
        radial-gradient(125% 120% at 50% -10%, #1B2740 0%, #0F141D 55%, #0A0D13 100%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 8px 8px 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.05);
      color: #E6E9ED;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .globe-card svg { display: block; width: 100%; height: auto; }
    .globe-card .caption {
      text-align: center; font-size: 19px; line-height: 1.55;
      margin: 12px 18px 0;
    }
    .globe-card .dist { color: #FF3B6B; font-style: italic; font-weight: 500; }
    .globe-card .sub {
      display: block; margin-top: 9px;
      font-family: ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 12px; letter-spacing: 0.03em; color: #7E8794;
    }
  </style>
</head>
<body>
  <main class="wrap">

    <!-- ===== HERO ===== -->
    <p class="eyebrow reveal"></p>
    <h1 class="reveal"><a class="home" href="/" aria-label="Home">Enrico Marcato</a></h1>
    <p class="lede reveal">
      Hi there, I'm Enrico. 
    </p>

    <!-- ===== ABOUT ===== -->
    <section>
      <h2>About me</h2>
      <div class="globe-card">
        <svg id="globe" viewBox="0 0 560 470" role="img" aria-label="A globe showing the distance from The Hague to your location"></svg>
        <p class="caption">
          <span id="line">I'm from The Hague, Netherlands.</span>
          <span class="sub" id="sub">based on your IP address</span>
        </p>
      </div>
    </section>

    <!-- ===== PROJECTS =====
         To add a project: copy one .project block, change the text, point the link
         at your repo or a live page. Delete the placeholder once you ship the first one. -->
    <section>
      <h2></h2>

      <div class="project">

      </div>

      <!-- Example of a real one (uncomment + edit when ready):
      <div class="project">
        <h3><a href="https://github.com/yourusername/your-repo">EDI flow monitor</a></h3>
        <p>A small dashboard that flags failed transmissions before anyone notices.</p>
      </div>
      -->
    </section>

    <!-- ===== REACH OUT ===== -->
    <section>
      <h2>Say hello</h2>
      <p class="links">
        <span>email&nbsp;&nbsp;→</span> <a href="mailto:enricmarcato@gmail.com">enricmarcato@gmail.com</a><br />
        <span>linkedin →</span> <a href="https://www.linkedin.com/in/enrimarcato">/in/enrimarcato</a><br />
        <!-- EDIT: replace with your GitHub username -->
        <span>github&nbsp;&nbsp;→</span> <a href="https://github.com/enricomarcato">/enricomarcato</a>
      </p>
    </section>

    <footer>
      © <span id="y"></span> Enrico Marcato · hosted on GitHub Pages
    </footer>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script>
  (function () {
    const HOME = [4.4777, 51.9244];      // [lon, lat] — The Hague
    const PLACE = "The Hague, Netherlands";
    const SAME_KM = 30;                   // within this, "Just like you."

    const C = {
      accent: "#FF3B6B",   // home + arc + distance text
      pin:    "#EAF0F7",   // visitor marker
      grid:   "rgba(255,255,255,0.07)",
    };

    const W = 560, H = 470, PAD = 70;     // PAD keeps markers off the edges
    const MIN = 196;                      // whole globe fits the card
    const MAX = 1500;                     // don't over-zoom tiny distances
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const ease = d3.easeCubicInOut;

    const projection = d3.geoOrthographic()
      .clipAngle(90).translate([W / 2, H / 2]).scale(MIN)
      .rotate([-HOME[0], -HOME[1]]);
    const path = d3.geoPath(projection);
    const graticule = d3.geoGraticule10();

    const svg = d3.select("#globe");

    // ---- gradients & glow filters -----------------------------------------
    const defs = svg.append("defs");
    const ocean = defs.append("radialGradient")
      .attr("id", "ocean").attr("cx", "50%").attr("cy", "36%").attr("r", "75%");
    ocean.append("stop").attr("offset", "0%").attr("stop-color", "#26344B");
    ocean.append("stop").attr("offset", "70%").attr("stop-color", "#161F2E");
    ocean.append("stop").attr("offset", "100%").attr("stop-color", "#0C121C");

    const halo = defs.append("radialGradient")
      .attr("id", "halo").attr("cx", "50%").attr("cy", "50%").attr("r", "50%");
    halo.append("stop").attr("offset", "82%").attr("stop-color", "rgba(80,140,220,0)");
    halo.append("stop").attr("offset", "94%").attr("stop-color", "rgba(96,150,230,0.22)");
    halo.append("stop").attr("offset", "100%").attr("stop-color", "rgba(96,150,230,0)");

    const arcGrad = defs.append("linearGradient")
      .attr("id", "arcGrad").attr("gradientUnits", "userSpaceOnUse");
    arcGrad.append("stop").attr("offset", "0%").attr("stop-color", C.accent);
    arcGrad.append("stop").attr("offset", "100%").attr("stop-color", C.pin);

    const blur = defs.append("filter")
      .attr("id", "soft").attr("x", "-60%").attr("y", "-60%")
      .attr("width", "220%").attr("height", "220%");
    blur.append("feGaussianBlur").attr("stdDeviation", "3.2");

    // ---- layers (created once, updated each frame) -------------------------
    const gHalo = svg.append("circle").attr("cx", W / 2).attr("cy", H / 2).attr("fill", "url(#halo)");
    const gSphere = svg.append("path").attr("fill", "url(#ocean)")
      .attr("stroke", "rgba(120,160,210,0.18)").attr("stroke-width", 1);
    const gGrid = svg.append("path").attr("fill", "none").attr("stroke", C.grid).attr("stroke-width", 0.6);
    const gLand = svg.append("path").attr("fill", "#33425A")
      .attr("stroke", "rgba(0,0,0,0.30)").attr("stroke-width", 0.4);
    const gArcGlow = svg.append("path").attr("fill", "none").attr("stroke", C.accent)
      .attr("stroke-width", 5).attr("stroke-linecap", "round")
      .attr("opacity", 0.5).attr("filter", "url(#soft)");
    const gArc = svg.append("path").attr("fill", "none").attr("stroke", "url(#arcGrad)")
      .attr("stroke-width", 2.4).attr("stroke-linecap", "round");
    const gHome = svg.append("g");
    const gVisit = svg.append("g");
    const gPulse = svg.append("circle").attr("r", 3).attr("fill", "#fff").attr("opacity", 0);

    // soft halo + solid core, with an expanding ping ring
    function buildMarker(g, color, coreR) {
      g.append("circle").attr("class", "ping").attr("r", coreR)
        .attr("fill", "none").attr("stroke", color).attr("stroke-width", 2).attr("opacity", 0);
      g.append("circle").attr("r", coreR + 5).attr("fill", color).attr("opacity", 0.22);
      g.append("circle").attr("r", coreR).attr("fill", color);
      if (!reduce) {
        g.select(".ping").attr("opacity", 0.5)
          .append("animate").attr("attributeName", "r")
          .attr("values", coreR + ";" + (coreR + 9) + ";" + coreR)
          .attr("dur", "2.4s").attr("repeatCount", "indefinite");
        g.select(".ping").append("animate").attr("attributeName", "opacity")
          .attr("values", "0.5;0;0.5").attr("dur", "2.4s").attr("repeatCount", "indefinite");
      }
    }
    buildMarker(gHome, C.accent, 4.5);
    buildMarker(gVisit, C.pin, 4.5);

    // a point is on the near (visible) hemisphere of the globe
    function onFront(coord) {
      const r = projection.rotate();
      return d3.geoDistance(coord, [-r[0], -r[1]]) < Math.PI / 2 - 0.001;
    }
    function place(g, coord) {
      const p = projection(coord);
      if (p && onFront(coord)) g.attr("transform", `translate(${p[0]},${p[1]})`).style("display", null);
      else g.style("display", "none");
    }

    // sample the great circle so the arc bends correctly with the globe
    function arcLine(visitor, t) {
      const gi = d3.geoInterpolate(HOME, visitor), n = 80, c = [];
      for (let i = 0; i <= n; i++) c.push(gi((i / n) * t));
      return { type: "LineString", coordinates: c };
    }

    let land = null, current = null;     // current = visitor or null
    let timer = null;                    // only one animation timer at a time
    function run(cb) { if (timer) timer.stop(); timer = d3.timer(cb); }

    function render(arcT) {
      const s = projection.scale();
      gHalo.attr("r", s * 1.16);
      gSphere.attr("d", path({ type: "Sphere" }));
      gGrid.attr("d", path(graticule));
      if (land) gLand.attr("d", path(land));

      if (current && arcT > 0) {
        const line = arcLine(current, arcT);
        const d = path(line);
        gArc.attr("d", d).style("display", null);
        gArcGlow.attr("d", d).style("display", null);
        // anchor the gradient to the two endpoints on screen
        const a = projection(HOME), b = projection(current);
        if (a && b) arcGrad.attr("x1", a[0]).attr("y1", a[1]).attr("x2", b[0]).attr("y2", b[1]);
      } else {
        gArc.style("display", "none");
        gArcGlow.style("display", "none");
      }

      place(gHome, HOME);
      if (current && arcT >= 1) place(gVisit, current); else gVisit.style("display", "none");
    }

    // frame the journey: rotate centre to the midpoint, fitExtent does scale+translate
    function frame(visitor) {
      const mid = d3.geoInterpolate(HOME, visitor)(0.5);
      projection.rotate([-mid[0], -mid[1]]).scale(MIN).translate([W / 2, H / 2]);
      projection.fitExtent([[PAD, PAD], [W - PAD, H - PAD]],
        { type: "LineString", coordinates: [HOME, visitor] });
      const scale = clamp(projection.scale(), MIN, MAX);
      projection.scale(scale).translate([W / 2, H / 2]);
      return { rotate: [-mid[0], -mid[1]], scale };
    }

    // gently turn + zoom from home to the framed view, then draw the arc
    function flyTo(visitor) {
      current = visitor;
      const dest = frame(visitor);
      const rot0 = [-HOME[0], -HOME[1]];
      const rotI = d3.interpolate(rot0, dest.rotate);
      const sclI = d3.interpolate(MIN, dest.scale);
      const DA = reduce ? 0 : 1000, DB = reduce ? 0 : 850;

      if (reduce) {
        projection.rotate(dest.rotate).scale(dest.scale).translate([W / 2, H / 2]);
        render(1); travel(visitor); return;
      }
      run((t) => {
        if (t < DA) {
          const k = ease(t / DA);
          projection.rotate(rotI(k)).scale(sclI(k)).translate([W / 2, H / 2]);
          render(0);
        } else {
          projection.rotate(dest.rotate).scale(dest.scale).translate([W / 2, H / 2]);
          const tb = Math.min(1, (t - DA) / DB);
          render(ease(tb));
          if (tb >= 1) travel(visitor);   // run() stops this timer, starts the next
        }
      });
    }

    // a small light that keeps travelling home -> visitor along the arc
    function travel(visitor) {
      if (reduce) { if (timer) timer.stop(); return; }
      const gi = d3.geoInterpolate(HOME, visitor);
      run((el) => {
        const t = (el % 2600) / 2600, c = gi(t), p = projection(c);
        if (p && onFront(c)) gPulse.attr("cx", p[0]).attr("cy", p[1]).attr("opacity", 0.9);
        else gPulse.attr("opacity", 0);
      });
    }

    // slow idle spin when we don't know where the visitor is
    function idleSpin() {
      current = null;
      projection.scale(MIN * 1.02).translate([W / 2, H / 2]);
      gVisit.style("display", "none");
      if (reduce) { if (timer) timer.stop(); projection.rotate([-HOME[0], -HOME[1]]); render(0); return; }
      run((el) => {
        projection.rotate([-HOME[0] - el * 0.004, -28]);
        render(0);
      });
    }

    function distanceKm(a, b) {
      const R = 6371, rad = d => d * Math.PI / 180;
      const dLat = rad(b[1] - a[1]), dLon = rad(b[0] - a[0]);
      const x = Math.sin(dLat / 2) ** 2 +
                Math.cos(rad(a[1])) * Math.cos(rad(b[1])) * Math.sin(dLon / 2) ** 2;
      return Math.round(2 * R * Math.asin(Math.sqrt(x)));
    }

    function caption(km) {
      const line = document.getElementById("line");
      if (km == null) { line.textContent = `I'm from ${PLACE}.`; return; }
      if (km <= SAME_KM) {
        line.innerHTML = `I'm from ${PLACE}. <span class="dist">Just like you.</span>`;
      } else {
        line.innerHTML = `I'm from ${PLACE}, roughly ` +
          `<span class="dist">${km.toLocaleString("en-US")} km</span> ` +
          `away from your current location.`;
      }
    }

    async function init() {
      try {
        const world = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json").then(r => r.json());
        land = topojson.feature(world, world.objects.land);
      } catch (e) { console.warn("map unavailable", e); }

      let visitor = null, km = null;
      try {
        const d = await fetch("https://ipapi.co/json/").then(r => r.json());
        if (typeof d.latitude === "number" && typeof d.longitude === "number") {
          visitor = [d.longitude, d.latitude];
          km = distanceKm(HOME, visitor);
        }
      } catch (e) { console.warn("location unavailable", e); }

      caption(km);
      if (visitor && km > SAME_KM) flyTo(visitor);  // a real journey to draw
      else idleSpin();                              // unknown, or basically here
    }

    init();
  })();
  </script>
</body>
</html>
